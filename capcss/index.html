<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição em Curso</title>

    <link rel="stylesheet" href="style.css">
</head>




<body>

    <header>
        <h1>
            <span class="titulo-laranja">Inscrição</span> em Curso
        </h1>

        <p>
            Preencha o formulário abaixo para realizar sua inscrição.
        </p>
    </header>

    <form>

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome">

        <label for="email">E-mail:</label>
        <input type="email" id="email">

        <label for="senha">Senha:</label>
        <input type="password" id="senha">

        <label for="data">Data de Nascimento:</label>
        <input type="date" id="data">

        <label for="curso">Curso:</label>
        <select id="curso">
            <option>Informática</option>
            <option>Química</option>
            <option>Eletrotécnica</option>
            <option>Eletronica</option>
            <option>Mecanica</option>
            <option>estradas</option>
            <option>Edificações</option>
        </select>

        <label for="comentario">Comentário:</label>
        <textarea id="comentario"></textarea>

        <p>Turno:</p>

        <input type="radio" id="manha" name="turno">
        <label class="inline" for="manha">Manhã</label>

        <input type="radio" id="tarde" name="turno">
        <label class="inline" for="tarde">Tarde</label>

        <br><br>

        <input type="checkbox" id="termos">
        <label class="inline" for="termos">
            Aceito os termos de uso
        </label>

        <br><br>

        <button type="submit">
            Enviar
        </button>

    </form>

    <footer>
        <p>Integrantes: Erick Morgan</p>
        <p>Data: 12/06/2026</p>
        <p>Disciplina: Desenvolvimento Web</p>
    </footer>

</body>

</html>
